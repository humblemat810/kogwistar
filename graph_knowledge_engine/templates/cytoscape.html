<!doctype html>
<html>
  <head>
    <meta charset="utf-8"/>
    <title>Cytoscape viz</title>
    <style>
      #cy { width:100vw; height:100vh; margin:0; }
      #bar {
        position:fixed; top:8px; left:8px; z-index: 10;
        background:#fff9; padding:8px 10px; border-radius:8px;
        font: 12px/1.3 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        box-shadow: 0 2px 8px rgba(0,0,0,.15);
      }
      #bar button { margin-right:6px; }
      code { background:#eef; padding:1px 4px; border-radius:4px; }
    </style>
    <script src="https://unpkg.com/cytoscape@3.26.0/dist/cytoscape.min.js"></script>
  </head>
  <body>
    <div id="bar">
      <div style="margin-bottom:6px;">
        <b>doc_id</b>=<code>{{ doc_id or '' }}</code> &nbsp;|&nbsp;
        <b>mode</b>=<code>{{ mode }}</code> &nbsp;|&nbsp;
        <b>insertion_method</b>=<code>{{ insertion_method or '' }}</code>
      </div>
      <button id="zoomIn">＋</button>
      <button id="zoomOut">－</button>
      <button id="resetZoom">Reset</button>
      <button id="layout">Re-layout</button>
    </div>
    <div id="cy"></div>
    <script>
      async function main(){
        const params = new URLSearchParams({
          "doc_id": "{{ doc_id or '' }}",
          "mode": "{{ mode }}"
        });
        const insertionMethod = {{ (insertion_method or none) | tojson }};
        if (insertionMethod) params.set("insertion_method", insertionMethod);

        const res = await fetch("/api/viz/cytoscape.json?" + params.toString());
        const data = await res.json();

        const cy = cytoscape({
          container: document.getElementById('cy'),
          elements: data.elements,
          layout: { name: 'cose' },
          style: [
            { selector: 'node', style: { 'shape': 'ellipse', 'label': 'data(label)', 'font-size': 10, 'background-color': '#69b', 'text-wrap': 'wrap', 'text-max-width': 120 } },
            { selector: 'node.edge-node', style: { 'shape': 'diamond', 'background-color': '#999' } },
            { selector: 'edge', style: { 'curve-style': 'bezier', 'target-arrow-shape': 'triangle', 'label': 'data(label)', 'font-size': 8, 'line-color': '#888', 'target-arrow-color': '#888' } },
            { selector: 'edge.src', style: { 'line-color': '#4a8', 'target-arrow-color': '#4a8' } },
            { selector: 'edge.tgt', style: { 'line-color': '#a48', 'target-arrow-color': '#a48' } },
          ],
        });

        // simple controls
        document.getElementById('zoomIn').onclick  = () => cy.zoom(cy.zoom() * 1.2);
        document.getElementById('zoomOut').onclick = () => cy.zoom(cy.zoom() / 1.2);
        document.getElementById('resetZoom').onclick = () => { cy.zoom(1); cy.center(); };
        document.getElementById('layout').onclick = () => cy.layout({ name: 'cose' }).run();
      }
      main();
    </script>
  </body>
</html>
