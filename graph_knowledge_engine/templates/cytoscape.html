<!doctype html>
<html>
  <head>
    <meta charset="utf-8"/>
    <title>Cytoscape viz</title>
    <style>
      body { margin:0; }
      #cy { width:100vw; height:100vh; }
      #bar {
        position:fixed; top:8px; left:8px; z-index: 10;
        background:#fff9; padding:8px 10px; border-radius:8px;
        font: 12px/1.3 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        box-shadow: 0 2px 8px rgba(0,0,0,.15);
      }
      #bar label { margin-right:6px; }
      #bar input[type=range] { width:110px; vertical-align: middle; }
      #bar button, #bar select { margin-right:6px; }
      code { background:#eef; padding:1px 4px; border-radius:4px; }
    </style>
    <script src="https://unpkg.com/cytoscape@3.26.0/dist/cytoscape.min.js"></script>
  </head>
  <body>
    <div id="bar">
      <div style="margin-bottom:6px;">
        <b>doc_id</b>=<code>{{ doc_id or '' }}</code> &nbsp;|&nbsp;
        <b>mode</b>=<code>{{ mode }}</code> &nbsp;|&nbsp;
        <b>insertion_method</b>=<code>{{ insertion_method or '' }}</code>
      </div>
      <button id="zoomIn">＋</button>
      <button id="zoomOut">－</button>
      <button id="fit">Fit</button>
      <select id="layout">
        <option value="cose" selected>cose</option>
        <option value="breadthfirst">breadthfirst</option>
        <option value="concentric">concentric</option>
        <option value="grid">grid</option>
      </select>
      <label>Node font <input id="nodeFont" type="range" min="6" max="18" value="10"></label>
      <label>Edge font <input id="edgeFont" type="range" min="6" max="16" value="8"></label>
    </div>
    <div id="cy"></div>
    <script>
      async function main(){
        const params = new URLSearchParams({
          "doc_id": "{{ doc_id or '' }}",
          "mode": "{{ mode }}"
        });
        const insertionMethod = {{ (insertion_method or none) | tojson }};
        if (insertionMethod) params.set("insertion_method", insertionMethod);

        const res = await fetch("/api/viz/cytoscape.json?" + params.toString());
        const data = await res.json();

        const cy = cytoscape({
          container: document.getElementById('cy'),
          elements: data.elements,
          layout: { name: 'cose' },
          wheelSensitivity: 0.2,
          style: [
            { selector: 'node',      style: { 'label': 'data(label)', 'font-size': 10 } },
            { selector: '.edge-node',style: { 'shape': 'diamond', 'background-color': '#999' } },
            { selector: 'edge',      style: { 'curve-style': 'bezier', 'target-arrow-shape': 'triangle', 'label': 'data(label)', 'font-size': 8 } },
            { selector: '.src',      style: { 'line-color': '#4a8', 'target-arrow-color': '#4a8' } },
            { selector: '.tgt',      style: { 'line-color': '#a48', 'target-arrow-color': '#a48' } },
          ],
        });

        // UI
        document.getElementById('zoomIn').onclick  = () => cy.zoom(cy.zoom() * 1.2);
        document.getElementById('zoomOut').onclick = () => cy.zoom(cy.zoom() / 1.2);
        document.getElementById('fit').onclick     = () => cy.fit();

        document.getElementById('layout').onchange = (e) => {
          cy.layout({ name: e.target.value }).run();
        };

        const nodeFont = document.getElementById('nodeFont');
        const edgeFont = document.getElementById('edgeFont');
        function applyFonts(){
          cy.style()
            .selector('node').style('font-size', parseInt(nodeFont.value, 10))
            .selector('edge').style('font-size', parseInt(edgeFont.value, 10))
            .update();
        }
        nodeFont.oninput = applyFonts;
        edgeFont.oninput = applyFonts;
      }
      main();
    </script>
  </body>
</html>
