<!doctype html>
<html>
  <head>
    <meta charset="utf-8"/>
    <title>D3 force viz</title>
    <style>
      body { margin:0; }
      svg { width:100vw; height:100vh; }
      #bar {
        position:fixed; top:8px; left:8px; z-index: 10;
        background:#fff9; padding:8px 10px; border-radius:8px;
        font: 12px/1.3 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        box-shadow: 0 2px 8px rgba(0,0,0,.15);
      }
      #bar label { margin-right:8px; }
      #bar input[type=range] { width:110px; vertical-align: middle; }
      #bar button { margin-right:6px; }
      code { background:#eef; padding:1px 4px; border-radius:4px; }
      #tt {
        position:fixed; display:none; pointer-events:none;
        background:#222; color:#fff; padding:6px 8px; border-radius:6px; font:12px/1.3 sans-serif; white-space:pre; z-index:20;
      }
    </style>
    <script src="https://unpkg.com/d3@7"></script>
  </head>
  <body>
    <div id="bar">
      <div style="margin-bottom:6px;">
        <b>doc_id</b>=<code>{{ doc_id or '' }}</code> &nbsp;|&nbsp;
        <b>mode</b>=<code>{{ mode }}</code> &nbsp;|&nbsp;
        <b>insertion_method</b>=<code>{{ insertion_method or '' }}</code>
      </div>
      <button id="zoomIn">＋</button>
      <button id="zoomOut">－</button>
      <button id="resetZoom">Reset</button>
      <label>Label font <input id="fontSize" type="range" min="8" max="18" value="10"></label>
      <label>Link dist <input id="linkDist" type="range" min="30" max="200" value="80"></label>
      <label>Charge <input id="charge" type="range" min="-400" max="-20" value="-120"></label>
    </div>
    <div id="tt"></div>
    <svg></svg>
    <script>
      async function main(){
        const params = new URLSearchParams({
          "doc_id":"{{ doc_id or '' }}",
          "mode":"{{ mode }}"
        });
        const insertionMethod = {{ (insertion_method or none) | tojson }};
        if (insertionMethod) params.set("insertion_method", insertionMethod);

        const res = await fetch("/api/viz/d3.json?" + params.toString());
        const data = await res.json();
        const isReify = (data.mode || "").toLowerCase() === "reify";

        const svg = d3.select("svg"),
              width = window.innerWidth,
              height = window.innerHeight;

        // zoom/pan container
        const g = svg.append("g");
        const zoom = d3.zoom().scaleExtent([0.2, 80]).on("zoom", (event) => {
          g.attr("transform", event.transform);
        });
        svg.call(zoom);

        // force setup
        const linkForce = d3.forceLink(data.links).id(d => d.id).distance(80);
        const chargeForce = d3.forceManyBody().strength(-120);
        const sim = d3.forceSimulation(data.nodes)
          .force("charge", chargeForce)
          .force("link", linkForce)
          .force("center", d3.forceCenter(width/2, height/2));

        // links + tooltips
        const linkSel = g.append("g")
          .attr("stroke","#999").attr("stroke-opacity",0.6)
          .selectAll("line").data(data.links).join("line")
          .attr("stroke-width",1.5);

        linkSel.append("title").text(d => {
          const rel = d.relation || d.label || "";
          const props = d.properties ? JSON.stringify(d.properties) : "";
          return [rel, props].filter(Boolean).join(" • ") || "link";
        });

        // nodes (split by kind)
        const entities = data.nodes.filter(d => d.type !== "edge-node");
        const edgeNodes = data.nodes.filter(d => d.type === "edge-node");

        const nodeCircle = g.append("g").attr("stroke","#fff").attr("stroke-width",1.5)
          .selectAll("circle").data(entities, d => d.id).join("circle")
          .attr("r", 4)
          .attr("fill", "#69b")
          .call(d3.drag()
            .on("start", (event,d)=>{ if(!event.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
            .on("drag",  (event,d)=>{ d.fx=event.x; d.fy=event.y; })
            .on("end",   (event,d)=>{ if(!event.active) sim.alphaTarget(0); d.fx=null; d.fy=null; }));

        // minimal addition: native tooltip with label/summary/id
        nodeCircle.append("title").text(d => {
          return [d.label || d.id, d.summary, d.id].filter(Boolean).join('\n');
        });

        const diamond = d3.symbol().type(d3.symbolDiamond).size(90);
        const nodeDiamond = g.append("g").attr("stroke","#fff").attr("stroke-width",1.0)
          .selectAll("path").data(edgeNodes, d => d.id).join("path")
          .attr("d", diamond)
          .attr("fill", "#d77") /* different from link grey so nodes vs edges are distinct */
          .call(d3.drag()
            .on("start", (event,d)=>{ if(!event.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
            .on("drag",  (event,d)=>{ d.fx=event.x; d.fy=event.y; })
            .on("end",   (event,d)=>{ if(!event.active) sim.alphaTarget(0); d.fx=null; d.fy=null; }));

        // minimal addition: native tooltip for edge-nodes with label/summary/id
        nodeDiamond.append("title").text(d => {
          return [d.label || "edge-node", d.summary, d.id].filter(Boolean).join('\n');
        });
        // node labels
        const labels = g.append("g").selectAll("text").data(data.nodes, d => d.id).join("text")
          .text(d=>d.label||d.id)
          .style("font", "10px sans-serif");

        // diamond tooltips (keep existing behavior)
        if (isReify) {
          const tt = document.getElementById('tt');
          const show = (txt, evt) => { tt.textContent = txt; tt.style.display = 'block'; tt.style.left=(evt.clientX+12)+'px'; tt.style.top=(evt.clientY+12)+'px'; };
          const hide = () => { tt.style.display = 'none'; };
          nodeDiamond
            .on("mouseover", (evt, d) => {
              const title = d.label || "edge-node";
              const summary = d.summary;
              const props = d.properties ? Object.entries(d.properties).map(([k,v]) => `${k}: ${v}`).join('\n') : '';
              show([title, props, summary].filter(Boolean).join('\n'), evt);
              console.log(title)
              console.log(d)
            })
            .on("mousemove", (evt) => { tt.style.left=(evt.clientX+12)+'px'; tt.style.top=(evt.clientY+12)+'px'; })
            .on("mouseout", hide);
        }

        // tick
        sim.on("tick", () => {
          linkSel
            .attr("x1", d => d.source.x)
            .attr("y1", d => d.source.y)
            .attr("x2", d => d.target.x)
            .attr("y2", d => d.target.y);

          nodeCircle.attr("cx", d => d.x).attr("cy", d => d.y);
          nodeDiamond.attr("transform", d => `translate(${d.x},${d.y})`);
          labels.attr("x", d => d.x + 6).attr("y", d => d.y + 3);
        });

        // controls
        document.getElementById('zoomIn').onclick  = () => svg.transition().call(zoom.scaleBy, 1.4);
        document.getElementById('zoomOut').onclick = () => svg.transition().call(zoom.scaleBy, 1/1.4);
        document.getElementById('resetZoom').onclick = () => svg.transition().call(zoom.transform, d3.zoomIdentity);

        const fontSize = document.getElementById('fontSize');
        fontSize.oninput = () => { labels.style("font", fontSize.value + "px sans-serif"); };

        const linkDist = document.getElementById('linkDist');
        linkDist.oninput = () => { linkForce.distance(parseInt(linkDist.value, 10)); sim.alpha(0.6).restart(); };

        const charge = document.getElementById('charge');
        charge.oninput = () => { chargeForce.strength(parseInt(charge.value, 10)); sim.alpha(0.6).restart(); };
      }
      main();
    </script>
  </body>
</html>
