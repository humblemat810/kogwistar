<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>D3 graph viewer</title>
    <style>
      body { margin:0; }
      svg { width:100vw; height:100vh; display:block; }
      #bar {
        position:fixed; top:8px; left:8px; z-index: 10;
        background:#fff9; padding:8px 10px; border-radius:8px;
        font: 12px/1.3 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        box-shadow: 0 2px 8px rgba(0,0,0,.15);
        max-width: calc(100vw - 16px);
      }
      #bar label { margin-right:8px; white-space: nowrap; }
      #bar input[type=range] { width:120px; vertical-align: middle; }
      #bar button { margin-right:6px; }
      code { background:#eef; padding:1px 4px; border-radius:4px; }
      .dropdown { display:inline-block; position:relative; margin-left:8px; }
      .dropdown button { padding:2px 8px; }
      .menu {
        position:absolute; top:100%; left:0; margin-top:4px; min-width:260px;
        background:#fff; border:1px solid #ccc; border-radius:6px; padding:8px;
        box-shadow: 0 2px 12px rgba(0,0,0,.15); display:none; z-index:20;
        max-height: 40vh; overflow:auto;
      }
      .menu label { display:flex; gap:8px; align-items:center; font:12px/1.4 sans-serif; padding:2px 0; }
      .menu .cmds { display:flex; gap:6px; margin-bottom:6px; flex-wrap: wrap; }
      #legend {
        position:fixed; right:8px; top:8px; z-index:10;
        background:#fff9; padding:8px 10px; border-radius:8px; font:12px/1.2 sans-serif;
        box-shadow: 0 2px 8px rgba(0,0,0,.15);
      }
      #legend .dot { display:inline-block; width:10px; height:10px; border-radius:50%; background:#69b; margin-right:6px; }
      #legend .diamond { display:inline-block; width:10px; height:10px; background:#d77; transform:rotate(45deg); margin-right:6px; }
      .hidden { display: none; }

      .focus-node { stroke: #ffb000; stroke-width: 3px; }
      .focus-label { font-weight: 700; text-decoration: underline; }
      .dim { opacity: 0.15; }

      #inspector {
        position: fixed;
        right: 8px;
        bottom: 8px;
        width: min(520px, calc(100vw - 16px));
        max-height: 55vh;
        overflow: auto;
        background:#fff9;
        border-radius: 8px;
        box-shadow: 0 2px 10px rgba(0,0,0,.18);
        padding: 10px;
        font: 12px/1.35 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        z-index: 10;
      }
      #inspector pre { margin:0; white-space: pre-wrap; word-break: break-word; }
      #inspector .hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
      #inspector .hdr b { font: 12px/1.2 system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
      #inspector button { font: 12px/1.2 system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
    </style>
    <script src="https://unpkg.com/d3@7"></script>
  </head>

  <body>
    <div id="bar">
      <div style="margin-bottom:6px;">
        <b>doc_id</b>=<code>{{ doc_id or '' }}</code> &nbsp;|&nbsp;
        <b>mode</b>=<code>{{ mode }}</code> &nbsp;|&nbsp;
        <b>insertion_method</b>=<code>{{ insertion_method or '' }}</code>
        {% if is_bundle %}&nbsp;|&nbsp;<b>bundle</b>=<code>true</code>{% endif %}
      </div>

      <button id="zoomIn">＋</button>
      <button id="zoomOut">－</button>
      <button id="resetZoom">Reset</button>

      <label>Label <input id="fontSize" type="range" min="8" max="18" value="10"></label>
      <label>Link <input id="linkDist" type="range" min="30" max="240" value="100"></label>
      <label>Charge <input id="charge" type="range" min="-800" max="-20" value="-300"></label>
      <label>Gravity <input id="gravity" type="range" min="0" max="0.3" step="0.005" value="0.06"></label>
      <label><input type="checkbox" id="freeze"> Freeze forces</label>
      <label style="margin-left:12px;">
        Layout:
        <select id="layoutMode">
          <option value="force">Force</option>
          <option value="spine">Conversation spine</option>
        </select>
      </label>
      <label style="margin-left:12px;">
        <input type="checkbox" id="spineMode"> Conversation spine
      </label>
      <label>Layer gap <input id="layerGap" type="range" min="60" max="300" value="160"></label>
      <br/>

      <label><input type="checkbox" id="treeMode"> Tree from summarizes_document root</label>
      <label><input type="checkbox" id="outwardOnly" disabled> Outward only</label>
      <label><input type="checkbox" id="inwardOnly" disabled> Inward only</label>
      <label><input type="checkbox" id="includeLateral" disabled> Include lateral</label>

      <span class="dropdown">
        <button id="relMenuBtn">Relations ▾</button>
        <div class="menu" id="relMenu">
          <div class="cmds">
            <button type="button" id="relAll">All</button>
            <button type="button" id="NotAny">NotAny</button>
            <button type="button" id="relSumm">Only “summ”</button>
          </div>
          <div id="relList"></div>
        </div>
      </span>

      <button id="applyFilters">Apply</button>
    </div>

    <div id="legend">
      <div><span class="dot"></span> entity node</div>
      <div><span class="diamond"></span> edge-node (reified relation)</div>
      <div style="margin-top:6px;"><span style="border-bottom:2px solid #999;">&nbsp;&nbsp;&nbsp;</span> directed link</div>
      <div style="margin-top:6px;">Tip: click a node to inspect JSON.</div>
      <div>Tip: <code>?focus=id1,id2</code> highlights.</div>
    </div>

    <div id="inspector" class="hidden">
      <div class="hdr">
        <b>Inspector</b>
        <div>
          <button id="openRef">Open ref</button>
          <button id="closeInspector">Close</button>
        </div>
      </div>
      <pre id="inspectorBody"></pre>
    </div>

    <svg></svg>

    <script>
      // Optional (bundle mode): server or CLI may inject these.
      window.__EMBEDDED_DATA__ = {{ embedded_data | safe if embedded_data is defined else "null" }};
      window.__BUNDLE_META__ = {{ bundle_meta | safe if bundle_meta is defined else "null" }};

      async function loadSnapshot() {
        // If your dump is embedded already, skip this and use the embedded JSON.
        const r = await fetch("/snapshot");
        if (!r.ok) throw new Error("snapshot fetch failed");
        return await r.json();
      }

      function applyEventToModel(model, ev) {
        // model: { nodesById: Map, edgesById: Map, ... }
        switch (ev.op) {
          case "node.upsert": {
            const n = ev.payload;
            model.nodesById.set(n.id, n);
            break;
          }
          case "node.remove": {
            model.nodesById.delete(ev.entity?.id);
            break;
          }
          case "edge.upsert": {
            const e = ev.payload;
            model.edgesById.set(e.id, e);
            break;
          }
          case "edge.remove": {
            model.edgesById.delete(ev.entity?.id);
            break;
          }
          case "checkpoint": {
            // optional UI decoration
            break;
          }
        }
      }

      function updateD3FromModel(model) {
        // Use keyed joins: .data(nodes, d => d.id) and .data(links, d => d.id)
        // Then update simulation nodes/links and restart alpha lightly.
      }

      async function connectLive(model, sinceSeq) {
        const proto = location.protocol === "https:" ? "wss:" : "ws:";
        const wsUrl = `${proto}//${location.host}/changes/ws?since_seq=${encodeURIComponent(sinceSeq)}`;
        const ws = new WebSocket(wsUrl);

        ws.onmessage = (m) => {
          const msg = JSON.parse(m.data);

          if (msg.type === "need_snapshot") {
            console.warn("need_snapshot:", msg.reason);
            // simplest: reload snapshot, then reconnect with new seq
            // (or do a catch-up HTTP request first)
            return;
          }

          const events = msg.type === "batch" ? msg.events : [msg.event];
          for (const e of events) {
            applyEventToModel(model, e);
            model.lastSeq = Math.max(model.lastSeq, e.seq);
          }
          updateD3FromModel(model);
        };

        ws.onclose = () => {
          // reconnect with backoff
          setTimeout(() => connectLive(model, model.lastSeq), 1000);
        };

        return ws;
      }

      (async () => {
        const snap = await loadSnapshot();

        // Initialize in-memory model from snapshot
        const model = {
          nodesById: new Map((snap.nodes || []).map(n => [n.id, n])),
          edgesById: new Map((snap.edges || []).map(e => [e.id, e])),
          lastSeq: snap.seq || 0,
        };

        // initial render
        updateD3FromModel(model);

        // live upgrade
        connectLive(model, model.lastSeq);
    </script>
    
    <script>
      function linkPath(d){
        const sx = d.source.x, sy = d.source.y;
        const tx = d.target.x, ty = d.target.y;

        const k = d._parallel_count || 1;
        const i = d._parallel_index || 0;

        // Self-loop
        if (d.source.id === d.target.id) {
          const r = 18 + i * 8; // different radius for multiple self-loops
          // Arc loop around node
          return `M ${sx} ${sy} m 0 -${r} a ${r} ${r} 0 1 1 1 0 a ${r} ${r} 0 1 1 -1 0`;
        }

        // Parallel edges: curve offset perpendicular to the line
        const dx = tx - sx, dy = ty - sy;
        const len = Math.hypot(dx, dy) || 1;
        const nx = -dy / len, ny = dx / len; // unit perpendicular

        const step = 14; // spacing between parallel edges
        const offset = (i - (k - 1) / 2) * step;

        const mx = (sx + tx) / 2;
        const my = (sy + ty) / 2;

        const cx = mx + nx * offset;
        const cy = my + ny * offset;

        return `M ${sx} ${sy} Q ${cx} ${cy} ${tx} ${ty}`;
      }
      function isTurnNode(n) {
        return (typeof n.id === "string" && n.id.startsWith("TURN_")) ||
              (typeof n.label === "string" && /^Turn\s+\d+/.test(n.label));
      }

      function isConversationStart(n) {
        return (typeof n.id === "string" && n.id.startsWith("CONV_START")) ||
              (typeof n.label === "string" && n.label.toLowerCase().includes("conversation start"));
      }

      function isNextTurnEdgeNode(n) {
        return n && n.type === "edge-node" && (n.label === "next_turn" || n.label === "next turn");
      }

      function getTurnIndex(n) {
        // Prefer explicit if you later add it, else parse from label/id.
        const t = n?.properties?.turn_index ?? n?.metadata?.turn_index;
        if (typeof t === "number") return t;
        if (typeof n.label === "string") {
          const m = n.label.match(/^Turn\s+(\d+)/);
          if (m) return parseInt(m[1], 10);
        }
        if (typeof n.id === "string") {
          const m = n.id.match(/TURN_(\d+)/);
          if (m) return parseInt(m[1], 10);
        }
        return 0;
      }

      // Build spine order: start -> turn0 -> next_turn_edge -> turn1 -> ...
      function buildConversationSpine(nodes, links) {
        const byId = new Map(nodes.map(n => [n.id, n]));
        const turns = nodes.filter(isTurnNode).sort((a,b) => getTurnIndex(a) - getTurnIndex(b));
        if (!turns.length) return [];

        const start = nodes.find(isConversationStart);
        const order = [];
        if (start) order.push(start.id);

        // helper to find edge-node between two turns (turn -> edge -> turn)
        const out = new Map();
        for (const l of links) {
          const s = (typeof l.source === "object") ? l.source.id : l.source;
          const t = (typeof l.target === "object") ? l.target.id : l.target;
          if (!out.has(s)) out.set(s, []);
          out.get(s).push(t);
        }
        function findEdgeNodeBetween(aId, bId) {
          const mids = out.get(aId) || [];
          for (const mid of mids) {
            const midNode = byId.get(mid);
            if (!midNode || !isNextTurnEdgeNode(midNode)) continue;
            const midsOut = out.get(mid) || [];
            if (midsOut.includes(bId)) return mid;
          }
          return null;
        }

        for (let i = 0; i < turns.length; i++) {
          order.push(turns[i].id);
          if (i < turns.length - 1) {
            const edgeId = findEdgeNodeBetween(turns[i].id, turns[i+1].id);
            if (edgeId) order.push(edgeId);
          }
        }
        return order;
      }

      function parseQuery() {
        const u = new URL(window.location.href);
        const qs = u.searchParams;
        const focus = (qs.get("focus") || "").split(",").map(s => s.trim()).filter(Boolean);
        const dataUrl = qs.get("data_url");
        return { focus, dataUrl };
      }

      function safeSvgId(s) {
        return String(s).replace(/[^A-Za-z0-9_-]/g, "_");
      }

      async function main(){
        const { focus, dataUrl } = parseQuery();
        const focusSet = new Set(focus);

        const params = new URLSearchParams({
          "doc_id":"{{ doc_id or '' }}",
          "mode":"{{ mode }}"
        });
        const insertionMethod = {{ insertion_method | tojson if insertion_method is not none else 'null' }};
        if (insertionMethod) params.set("insertion_method", insertionMethod);

        const resolvedDataUrl = dataUrl || ("/api/viz/d3.json?" + params.toString());

        let data = window.__EMBEDDED_DATA__;
        if (!data) {
          const res = await fetch(resolvedDataUrl);
          data = await res.json();
        }

        const allNodes = (data.nodes || []).map(n => ({...n}));
        const allLinks = (data.links || []).map(l => ({...l}));
        function stKey(e){
          const sid = (typeof e.source === "object" ? e.source.id : e.source);
          const tid = (typeof e.target === "object" ? e.target.id : e.target);
          return `${sid}→${tid}`; // directed key; use sorted if you want undirected grouping
        }

        const byPair = new Map();
        allLinks.forEach(e => {
          const k = stKey(e);
          if (!byPair.has(k)) byPair.set(k, []);
          byPair.get(k).push(e);
        });
        byPair.forEach(list => {
          list.forEach((e, i) => {
            e._parallel_index = i;
            e._parallel_count = list.length;
          });
        });
        const svg = d3.select("svg"),
              width = window.innerWidth,
              height = window.innerHeight;

        const gRoot = svg.append("g");
        const zoom = d3.zoom().scaleExtent([0.2, 24]).on("zoom", (e) => gRoot.attr("transform", e.transform));
        svg.call(zoom);

        const defs = svg.append("defs");
        const gradDefs = defs.append("g").attr("id", "edge-gradients");

        function keyEdge(e){
          const sid = (typeof e.source === "object" ? e.source.id : e.source);
          const tid = (typeof e.target === "object" ? e.target.id : e.target);
          const rel = (e.relation || e.label || "");
          return e.id || `${sid}->${tid}:${rel}`;
        }
        function gradIdForEdge(e){
          return "g-" + safeSvgId(keyEdge(e));
        }

        const gradSel = gradDefs
          .selectAll("linearGradient")
          .data(allLinks, keyEdge)
          .join(enter => {
            const g = enter.append("linearGradient")
              .attr("id", d => gradIdForEdge(d))
              .attr("gradientUnits", "userSpaceOnUse");
            g.append("stop").attr("offset", "0%").attr("stop-color", "#b3b3b3");
            g.append("stop").attr("offset", "100%").attr("stop-color", "#000");
            return g;
          });

        defs.append("marker")
          .attr("id","arrow").attr("viewBox","0 -5 10 10").attr("refX",12).attr("refY",0)
          .attr("markerWidth",6).attr("markerHeight",6).attr("orient","auto")
          .append("path").attr("d","M0,-5L10,0L0,5").attr("fill","#999");

        const gLinks = gRoot.append("g").attr("stroke","#999").attr("stroke-opacity",0.75);
        const gNodes = gRoot.append("g");
        const gLabels= gRoot.append("g");

        const fontSize    = document.getElementById('fontSize');
        const linkDistIn  = document.getElementById('linkDist');
        const chargeIn    = document.getElementById('charge');
        const gravityIn   = document.getElementById('gravity');
        const layerGapIn  = document.getElementById('layerGap');
        const freezeIn    = document.getElementById('freeze');

        const treeMode     = document.getElementById('treeMode');
        const spineMode = document.getElementById('spineMode');
        const outwardOnly  = document.getElementById('outwardOnly');
        const inwardOnly   = document.getElementById('inwardOnly');
        const includeLat   = document.getElementById('includeLateral');
        const applyBtn     = document.getElementById('applyFilters');

        document.getElementById('zoomIn').onclick  = () => svg.transition().call(zoom.scaleBy, 1.4);
        document.getElementById('zoomOut').onclick = () => svg.transition().call(zoom.scaleBy, 1/1.4);
        document.getElementById('resetZoom').onclick = () => svg.transition().call(zoom.transform, d3.zoomIdentity);

        const uniqueRelations = Array.from(
          new Set(allLinks.map(e => (e.relation || e.label || "").toLowerCase()).filter(Boolean))
        ).sort();
        const relList = document.getElementById('relList');
        const relMenu = document.getElementById('relMenu');
        const relBtn  = document.getElementById('relMenuBtn');

        function buildRelMenu() {
          relList.innerHTML = "";
          uniqueRelations.forEach(r => {
            const id = "rel_" + r.replace(/\W+/g, "_");
            const wrap = document.createElement('label');
            const cb = document.createElement('input');
            cb.type = "checkbox"; cb.id = id; cb.value = r; cb.checked = true;
            wrap.appendChild(cb);
            const span = document.createElement('span'); span.textContent = r;
            wrap.appendChild(span);
            relList.appendChild(wrap);
          });
        }
        buildRelMenu();

        relBtn.onclick = () => relMenu.style.display = (relMenu.style.display === "block") ? "none" : "block";
        document.addEventListener('click', (e) => {
          if (!relMenu.contains(e.target) && e.target !== relBtn) relMenu.style.display = "none";
        });
        document.getElementById('relAll').onclick = () => {
          relList.querySelectorAll('input[type=checkbox]').forEach(cb => cb.checked = true);
        };
        document.getElementById('NotAny').onclick = () => {
          relList.querySelectorAll('input[type=checkbox]').forEach(cb => cb.checked = false);
        };
        document.getElementById('relSumm').onclick = () => {
          relList.querySelectorAll('input[type=checkbox]').forEach(cb => cb.checked = cb.value.includes("summ"));
        };

        // Auto-hint for document_ingestion
        if (["document_ingestion", "document_parser_v1"].includes((insertionMethod || "").toLowerCase())) {
          treeMode.checked = true;
          outwardOnly.checked = true;
          outwardOnly.disabled = false;
          inwardOnly.disabled  = false;
          includeLat.disabled  = false;
        }

        const linkSel = gLinks.selectAll("path")
          .data(allLinks, keyEdge)
          .join("path")
          .attr("fill", "none")
          .attr("stroke-width", 1.6)
          .attr("marker-end", "url(#arrow)")
          .attr("stroke", d => `url(#${gradIdForEdge(d)})`);

        linkSel.append("title").text(d => {
          const rel = d.relation || d.label || "";
          const props = d.properties ? JSON.stringify(d.properties) : "";
          return [rel, props].filter(Boolean).join(" • ") || "link";
        });

        const entities = allNodes.filter(n => n.type !== "edge-node");
        const eNodes   = allNodes.filter(n => n.type === "edge-node");

        const nodeCircle = gNodes.append("g").attr("stroke","#fff").attr("stroke-width",1.3)
          .selectAll("circle").data(entities, d => d.id).join("circle")
          .attr("r", 5).attr("fill", "#69b");

        const diamondPath = d3.symbol().type(d3.symbolDiamond).size(120);
        const nodeDiamond = gNodes.append("g").attr("stroke","#fff").attr("stroke-width",1.0)
          .selectAll("path").data(eNodes, d => d.id).join("path")
          .attr("d", diamondPath).attr("fill", "#d77");

        nodeCircle.append("title").text(d => [d.label||d.id, d.summary, d.id].filter(Boolean).join("\n"));
        nodeDiamond.append("title").text(d => [d.label||"edge-node", d.summary, d.id].filter(Boolean).join("\n"));

        const labelSel = gLabels.selectAll("text").data(allNodes, d => d.id).join("text")
          .text(d=>d.label||d.id)
          .style("font", fontSize.value + "px sans-serif");


        function applyFocusStyles(){
          const hasFocus = focusSet.size > 0;
          nodeCircle.classed("focus-node", d => focusSet.has(d.id));
          nodeDiamond.classed("focus-node", d => focusSet.has(d.id));
          labelSel.classed("focus-label", d => focusSet.has(d.id));

          if (hasFocus) {
            nodeCircle.classed("dim", d => !focusSet.has(d.id));
            nodeDiamond.classed("dim", d => !focusSet.has(d.id));
            labelSel.classed("dim", d => !focusSet.has(d.id));
          }
        }
        applyFocusStyles();

        const linkForce   = d3.forceLink(allLinks).id(d => d.id).distance(+linkDistIn.value);
        const chargeForce = d3.forceManyBody().strength(+chargeIn.value);
        const gravX       = d3.forceX(width/2).strength(+gravityIn.value);
        const gravY       = d3.forceY(height/2).strength(+gravityIn.value);

        const sim = d3.forceSimulation(allNodes)
          .force("charge", chargeForce)
          .force("link", linkForce)
          .force("center", d3.forceCenter(width/2, height/2))
          .force("gravityX", gravX)
          .force("gravityY", gravY)
          .alpha(1)
          .on("tick", () => {
            linkSel
              linkSel.attr("d", linkPath);

            gradSel
              .attr("x1", d => (d.source && d.source.x) || 0)
              .attr("y1", d => (d.source && d.source.y) || 0)
              .attr("x2", d => (d.target && d.target.x) || 0)
              .attr("y2", d => (d.target && d.target.y) || 0);

            nodeCircle.attr("cx", d => d.x).attr("cy", d => d.y);
            nodeDiamond.attr("transform", d => `translate(${d.x},${d.y})`);
            labelSel.attr("x", d => d.x + 6).attr("y", d => d.y + 3);
          });

        // Drag: X-only when doc_tree (pinned Y), free otherwise
        const isDocTreePinnedY = () => treeMode.checked && (["document_ingestion", "document_parser_v1"].includes((insertionMethod || "").toLowerCase()));

        function layerY(n, depth, baseY, gap){
          const d = depth.get(n.id);
          return (d !== undefined) ? (baseY + d * gap) : n.y;
        }

        function makeDrag(depth, baseY, gap) {
          return d3.drag()
            .on("start", (event,d) => {
              if (!event.active) sim.alphaTarget(0.3).restart();
              if (isDocTreePinnedY()) {
                d.fx = d.x;
                d.fy = layerY(d, depth, baseY, gap);
              } else {
                d.fx = d.x; d.fy = d.y;
              }
            })
            .on("drag", (event,d) => {
              if (isDocTreePinnedY()) {
                d.fx = event.x;
                d.fy = layerY(d, depth, baseY, gap);
              } else {
                d.fx = event.x; d.fy = event.y;
              }
            })
            .on("end", (event,d) => {
              if (!event.active) sim.alphaTarget(0);
              if (isDocTreePinnedY()) {
                d.fx = null;
                d.fy = layerY(d, depth, baseY, gap);
              } else {
                d.fx = null; d.fy = null;
              }
            });
        }

        nodeCircle.call(makeDrag(new Map(), 40, +layerGapIn.value));
        nodeDiamond.call(makeDrag(new Map(), 40, +layerGapIn.value));

        fontSize.oninput = () => labelSel.style("font", fontSize.value + "px sans-serif");
        linkDistIn.oninput = () => { linkForce.distance(+linkDistIn.value); sim.alpha(0.3).restart(); };
        chargeIn.oninput   = () => { chargeForce.strength(+chargeIn.value); sim.alpha(0.3).restart(); };
        gravityIn.oninput  = () => {
          const s = +gravityIn.value;
          gravX.strength(s);
          gravY.strength(s);
          sim.alpha(0.3).restart();
        };
        freezeIn.onchange  = () => {
          if (freezeIn.checked) sim.stop();
          else sim.alpha(0.6).restart();
        };

        treeMode.onchange = () => {
          const on = treeMode.checked;
          outwardOnly.disabled = !on;
          inwardOnly.disabled  = !on;
          includeLat.disabled  = !on;
          if (!on) { outwardOnly.checked = false; inwardOnly.checked = false; }
          applyVisibility();
        };
        layoutMode.onchange = () => { applyVisibility(); };
        outwardOnly.onchange = () => { if (outwardOnly.checked) inwardOnly.checked = false; applyVisibility();};
        inwardOnly.onchange  = () => { if (inwardOnly.checked)  outwardOnly.checked = false; applyVisibility();};
        includeLat.onchange = () => { applyVisibility(); };
        function pickRootId() {
          const relName = "summarizes_document";
          const out = new Set(), inn = new Set();
          for (const e of allLinks) {
            const r = (e.relation || e.label || "").toLowerCase();
            if (r === relName) {
              const sid = (typeof e.source === "object" ? e.source.id : e.source);
              const tid = (typeof e.target === "object" ? e.target.id : e.target);
              out.add(sid); inn.add(tid);
            }
          }
          const candidates = [...out].filter(x => !inn.has(x));
          if (candidates.length > 0) return candidates[0];
          for (const n of allNodes) {
            const props = n.properties || n.metadata || {};
            if (props.kind && String(props.kind).toLowerCase() === "document_root") return n.id;
          }
          return (allNodes[0] && allNodes[0].id) || null;
        }

        function computeDepth(rootId) {
          const depth = new Map();
          if (!rootId) return depth;
          depth.set(rootId, 0);
          const q = [rootId];
          while (q.length) {
            const u = q.shift();
            const du = depth.get(u);
            for (const e of allLinks) {
              const sid = (typeof e.source === "object" ? e.source.id : e.source);
              const tid = (typeof e.target === "object" ? e.target.id : e.target);
              if (sid !== u) continue;
              if (!depth.has(tid)) { depth.set(tid, du + 1); q.push(tid); }
            }
          }
          return depth;
        }

        function readChosenRelations(){
          const set = new Set();
          document.querySelectorAll('#relList input[type=checkbox]').forEach(cb => {
            if (cb.checked) set.add(cb.value);
          });
          if (set.size === 0) uniqueRelations.forEach(r => set.add(r));
          return set;
        }
        function applyVisibility(){
          const chosen = readChosenRelations();

          let depth = new Map();
          const baseY = 40;
          const layerGap = +layerGapIn.value;

          if (treeMode.checked) {
            const rootId = pickRootId();
            depth = computeDepth(rootId);
          }

          const linkVisible = new Map();

          linkSel.each(function(e){
            const rname = (e.relation || e.label || "").toLowerCase();
            const sid = (typeof e.source === "object" ? e.source.id : e.source);
            const tid = (typeof e.target === "object" ? e.target.id : e.target);

            let ok = chosen.has(rname);

            if (ok && treeMode.checked) {
              const ds = depth.get(sid), dt = depth.get(tid);
              if (ds === undefined || dt === undefined) ok = false;

              const outOnly = outwardOnly.checked;
              const inOnly  = inwardOnly.checked;

              if (ok && outOnly) {
                ok = dt > ds || (includeLat.checked && dt === ds);
              } else if (ok && inOnly) {
                ok = dt < ds || (includeLat.checked && dt === ds);
              } else if (ok && !outOnly && !inOnly) {
                if (!includeLat.checked) ok = dt !== ds;
              }
            }

            linkVisible.set(keyEdge(e), ok);
            d3.select(this).classed("hidden", !ok);
          });


          // If no links are visible (e.g., edge-less graphs), show orphan nodes too.
          const anyNodeVisible = Array.from(nodeVisible.values()).some(Boolean);
          if (!anyNodeVisible) {
            allNodes.forEach(n => nodeVisible.set(n.id, true));
          }
          const always_show_orphan_node = true;
          const nodeVisible = new Map(allNodes.map(n => [n.id, false || always_show_orphan_node]));
          let anyVisible = false;
          linkSel.each(function(e){
            const k = keyEdge(e);
            if (!linkVisible.get(k)) return;
            const sid = (typeof e.source === "object" ? e.source.id : e.source);
            const tid = (typeof e.target === "object" ? e.target.id : e.target);
            nodeVisible.set(sid, true);
            anyVisible = true;
            nodeVisible.set(tid, true);
          });
          
          if (!anyVisible) {
            // No visible links => show isolated nodes too
            allNodes.forEach(n => nodeVisible.set(n.id, true));
          }

          nodeCircle.classed("hidden", d => !nodeVisible.get(d.id));
          nodeDiamond.classed("hidden", d => !nodeVisible.get(d.id));
          labelSel.classed("hidden", d => !nodeVisible.get(d.id));

          // ---- PINNING (mutually exclusive) ----
          if (layoutMode.value === "spine") {
            const spineY = 180;
            const turnGap = 240;

            const turns = allNodes
              .filter(n => nodeVisible.get(n.id) && isTurnNode(n))
              .map(n => ({ n, idx: getTurnIndex(n) }))
              .filter(x => x.idx !== null)
              .sort((a,b) => a.idx - b.idx);

            const idxPos = new Map();
            turns.forEach((t, i) => idxPos.set(t.n.id, i));

            allNodes.forEach(n => {
              if (!nodeVisible.get(n.id)) return;

              if (idxPos.has(n.id)) {
                const i = idxPos.get(n.id);
                n.fx = 140 + i * turnGap;
                n.fy = spineY;
                n.y  = spineY;
              } else {
                // leave others unpinned (do NOT clear their x unless you really want)
                n.fy = null;
              }
            });

          } else if (treeMode.checked) {
            // doc-tree pin: do NOT gate on insertionMethod
            allNodes.forEach(n => {
              if (!nodeVisible.get(n.id)) return;
              const d = depth.get(n.id);
              if (d !== undefined) {
                const y = baseY + d * layerGap;
                n.y = y; n.fy = y;
              } else {
                n.fy = null;
              }
            });

          } else {
            allNodes.forEach(n => { n.fy = null; n.fx = null; });
          }

          nodeCircle.call(makeDrag(depth, baseY, layerGap));
          nodeDiamond.call(makeDrag(depth, baseY, layerGap));

          if (!freezeIn.checked) sim.alpha(0.25).restart();
          applyFocusStyles();
        }

        applyBtn.onclick = () => applyVisibility();

        const inspector = document.getElementById("inspector");
        const inspectorBody = document.getElementById("inspectorBody");
        const closeInspector = document.getElementById("closeInspector");
        const openRefBtn = document.getElementById("openRef");

        let _selectedNode = null;

        function extractRefId(n) {
          if (!n) return null;
          const p = n.properties || {};
          // common patterns
          if (typeof p.refers_to_id === "string" && p.refers_to_id) return p.refers_to_id;
          if (Array.isArray(p.ref_node_ids) && p.ref_node_ids.length) return String(p.ref_node_ids[0]);
          if (Array.isArray(p.ref_edge_ids) && p.ref_edge_ids.length) return String(p.ref_edge_ids[0]);
          return null;
        }

        function showInspector(n) {
          _selectedNode = n;
          const refId = extractRefId(n);

          inspectorBody.textContent = JSON.stringify(n, null, 2);
          inspector.classList.remove("hidden");

          openRefBtn.disabled = !refId;
          openRefBtn.dataset.refId = refId || "";
        }


        openRefBtn.onclick = () => {
          const refId = openRefBtn.dataset.refId;
          if (!refId) return;

          const meta = window.__BUNDLE_META__ || {};
          // Prefer offline paired bundles when available
          let targetHref = null;

          // If this page is conversation, open KG bundle; if this page is KG, open conversation bundle.
          // We infer current graph type from meta if present; otherwise fall back to "file:" heuristic.
          const currentType = (meta.graph_type || meta.current_graph_type || "").toLowerCase();

          if (currentType === "conversation" && meta.kg_bundle_href) targetHref = meta.kg_bundle_href;
          if (currentType === "knowledge" && meta.conversation_bundle_href) targetHref = meta.conversation_bundle_href;

          if (targetHref) {
            const u = new URL(targetHref, window.location.href);
            u.searchParams.set("focus", refId);
            // preserve mode if known
            const mm = meta.mode || (typeof mode === "string" ? mode : null);
            if (mm) u.searchParams.set("mode", mm);
            window.open(u.toString(), "_blank");
            return;
          }

          // If opened from file:// without paired bundle meta, avoid producing file:///viz/...
          if (window.location.protocol === "file:") {
            alert("No bundled reference target available. Create a paired bundle (kg + conversation) to enable Open ref offline.");
            return;
          }

          // Online fallback (relative to current origin)
          const u = new URL(window.location.origin + "/viz/d3");
          u.searchParams.set("mode", (meta.mode || mode || "reify"));
          u.searchParams.set("focus", refId);
          window.open(u.toString(), "_blank");
        };


        let selectedDatum = null;

        function getRefIds(d){
          const props = (d && (d.properties || d.metadata)) || {};
          // Preferred explicit pointer(s)
          if (props.refers_to_id) return [String(props.refers_to_id)];
          if (props.kg && props.kg.refers_to_id) return [String(props.kg.refers_to_id)];

          // Bundle/export schema: ref_doc_id + ref_node_ids/ref_edge_ids
          const ids = [];
          if (Array.isArray(props.ref_node_ids)) ids.push(...props.ref_node_ids.map(String));
          if (Array.isArray(props.ref_edge_ids)) ids.push(...props.ref_edge_ids.map(String));
          // As a last resort, allow doc-level jump (open KG bundle without focus)
          if (props.ref_doc_id) ids.push(String(props.ref_doc_id));

          // De-dupe while preserving order
          return [...new Set(ids)].filter(Boolean);
        }

        function hideInspector(){
          inspector.classList.add("hidden");
          selectedDatum = null;
        }
        closeInspector.onclick = hideInspector;
        svg.on("click", () => hideInspector());

        function attachClick(sel){
          sel.on("click", (event, d) => {
            event.stopPropagation();
            showInspector(d);
          });
        }
        attachClick(nodeCircle);
        attachClick(nodeDiamond);

        applyVisibility();
      }
      main();
    </script>
  </body>
</html>
