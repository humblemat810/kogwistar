[pytest]
addopts = -p no:tmpdir
pythonpath = .
norecursedirs =
    .git
    .venv
    .pytest_cache
    .pytest*
    .tmp_build
    .tmp_pip
    .tmp_pytest
    pytest_tmp*
    tmp_pytest*
    .codex_tmp*
    manual_tmp*
    tmp_manual*
    tmp_verify*
    tests/_artifacts
    build
    dist
    .cache
markers =
    ci: required on pull-request CI
    ci_full: required on full CI (post-merge / broader matrix)
    nightly: nightly-only coverage
    core: engine/core graph capabilities
    workflow: workflow runtime and orchestration
    conversation: conversation orchestration and resolvers
    unit: no external systems, deterministic fast tests
    integration: multi-component integration tests
    e2e: end-to-end behavior tests across major components
    llm_real: tests requiring non-fake LLM behavior or external LLM credentials
    manual: manually triggered tests only

log_cli = true
log_cli_level = INFO
log_level = DEBUG    
