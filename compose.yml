services:
  app-chroma:
    profiles: ["chroma"]
    build:
      context: .
      dockerfile: Dockerfile
    image: kogwistar:local
    environment:
      HOST: 0.0.0.0
      PORT: 28110
      AUTH_MODE: ${AUTH_MODE:-oidc}
      OIDC_PROVIDERS_JSON: >-
        {"default_provider":"keycloak","providers":{"keycloak":{"name":"keycloak","discovery_url":"${OIDC_DISCOVERY_URL:-http://keycloak:8080/realms/kge/.well-known/openid-configuration}","redirect_uri":"${OIDC_REDIRECT_URI:-http://localhost:28110/api/auth/callback}","issuer":"${OIDC_ISSUER:-http://keycloak:8080/realms/kge}","client_id":"${OIDC_CLIENT_ID:-kge-local}","client_secret":"${OIDC_CLIENT_SECRET:-}","scopes":["openid","email","profile"],"required_email":true,"allowed":true}}}
      UI_URL: ${UI_URL:-http://localhost:5173/}
      DEV_AUTH_ROLE: rw
      DEV_AUTH_NS: docs,conversation,workflow,wisdom
      GKE_BACKEND: chroma
      GKE_PERSIST_DIRECTORY: /app/data
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-ollama}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-all-minilm:l6-v2}
    ports:
      - "28110:28110"
    volumes:
      - gke_chroma_data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import json, urllib.request; data=json.load(urllib.request.urlopen('http://127.0.0.1:28110/health')); assert data['ok']",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres:
    profiles: ["pg"]
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: kogwistar
      POSTGRES_USER: kogwistar
      POSTGRES_PASSWORD: kogwistar
    ports:
      - "5432:5432"
    volumes:
      - gke_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  app-pg:
    profiles: ["pg"]
    build:
      context: .
      dockerfile: Dockerfile
    image: kogwistar:local
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HOST: 0.0.0.0
      PORT: 28110
      AUTH_MODE: ${AUTH_MODE:-oidc}
      OIDC_PROVIDERS_JSON: >-
        {"default_provider":"keycloak","providers":{"keycloak":{"name":"keycloak","discovery_url":"${OIDC_DISCOVERY_URL:-http://keycloak:8080/realms/kge/.well-known/openid-configuration}","redirect_uri":"${OIDC_REDIRECT_URI:-http://localhost:28110/api/auth/callback}","issuer":"${OIDC_ISSUER:-http://keycloak:8080/realms/kge}","client_id":"${OIDC_CLIENT_ID:-kge-local}","client_secret":"${OIDC_CLIENT_SECRET:-}","scopes":["openid","email","profile"],"required_email":true,"allowed":true}}}
      UI_URL: ${UI_URL:-http://localhost:5173/}
      DEV_AUTH_ROLE: rw
      DEV_AUTH_NS: docs,conversation,workflow,wisdom
      GKE_BACKEND: pg
      GKE_PG_URL: postgresql+psycopg://kogwistar:kogwistar@postgres:5432/kogwistar
      GKE_PG_SCHEMA: gke
      GKE_EMBEDDING_DIM: 1536
      GKE_PERSIST_DIRECTORY: /app/data
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-ollama}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-all-minilm:l6-v2}
    ports:
      - "28110:28110"
    volumes:
      - gke_pg_app_data:/app/data
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import json, urllib.request; data=json.load(urllib.request.urlopen('http://127.0.0.1:28110/health')); assert data['ok'] and data['backend']=='pg'",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  keycloak:
    profiles: ["auth"]
    image: quay.io/keycloak/keycloak:24.0
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "8081:8080"
    volumes:
      - ./keycloak/realm-kge.json:/opt/keycloak/data/import/realm-kge.json:ro

  nginx:
    profiles: ["proxy"]
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app-pg
    extra_hosts:
      - "host.docker.internal:host-gateway"

  ollama:
    profiles: ["ollama"]
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Uncomment for GPU acceleration:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - capabilities: [gpu]

volumes:
  gke_chroma_data:
  gke_pg_data:
  gke_pg_app_data:
  ollama_data:
